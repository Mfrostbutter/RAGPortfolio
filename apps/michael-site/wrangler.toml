# Cloudflare Pages config for Michael Frost executive profile site.
#
# PUBLIC_* vars (PostHog, CF Web Analytics beacon) are NOT set here —
# wrangler.toml [vars] are runtime Function bindings and do NOT reach
# Astro's import.meta.env at build time. See
# .github/workflows/deploy-michael-site.yml build-step env: block.

name = "michael-site"
pages_build_output_dir = "dist"
compatibility_date = "2024-11-12"
